name: Build and Package applications

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Enable Windows desktop support
        run: flutter config --enable-windows-desktop

      - name: Recreate Windows scaffolding
        run: |
          cd apps/client_flutter
          flutter create --platforms=windows .

      - name: Get client dependencies
        run: |
          cd apps/client_flutter
          flutter pub get

      - name: Generate serialized code
        run: |
          cd apps/client_flutter
          dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows App
        run: |
          cd apps/client_flutter
          flutter build windows --release

      - name: Zip Flutter Windows Build
        run: |
          Compress-Archive -Path apps/client_flutter/build/windows/x64/runner/Release/* -DestinationPath client-flutter-windows.zip

      - name: Compile Headless Daemon Windows EXE
        run: |
          cd apps/headless_daemon
          dart pub get
          mkdir -p build
          dart compile exe bin/main.dart -o build/headless_daemon.exe

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            client-flutter-windows.zip
            apps/headless_daemon/build/headless_daemon.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Enable Linux desktop support
        run: flutter config --enable-linux-desktop

      - name: Recreate Linux scaffolding
        run: |
          cd apps/client_flutter
          flutter create --platforms=linux .

      - name: Get client dependencies
        run: |
          cd apps/client_flutter
          flutter pub get

      - name: Generate serialized code
        run: |
          cd apps/client_flutter
          dart run build_runner build --delete-conflicting-outputs

      - name: Build Linux App
        run: |
          cd apps/client_flutter
          flutter build linux --release

      - name: Tar Flutter Linux Build
        run: |
          tar -czf client-flutter-linux.tar.gz -C apps/client_flutter/build/linux/x64/release/bundle .

      - name: Compile Headless Daemon Linux Binary
        run: |
          cd apps/headless_daemon
          dart pub get
          mkdir -p build
          dart compile exe bin/main.dart -o build/headless_daemon

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: |
            client-flutter-linux.tar.gz
            apps/headless_daemon/build/headless_daemon

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Enable Android support
        run: flutter config --enable-android

      - name: Recreate Android scaffolding
        run: |
          cd apps/client_flutter
          flutter create --platforms=android .
          echo "android.newDsl=false" >> android/gradle.properties
          echo "android.builtInKotlin=false" >> android/gradle.properties

      - name: Get client dependencies
        run: |
          cd apps/client_flutter
          flutter pub get

      - name: Patch pub-cache JCenter dependencies
        run: |
          find /home/runner/.pub-cache -name "build.gradle" -exec sed -i 's/jcenter()/mavenCentral()/g' {} +

      - name: Generate serialized code
        run: |
          cd apps/client_flutter
          dart run build_runner build --delete-conflicting-outputs

      - name: Build Android APK
        run: |
          cd apps/client_flutter
          flutter build apk --release --no-tree-shake-icons

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-binaries
          path: apps/client_flutter/build/app/outputs/flutter-apk/app-release.apk

  create-release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-android]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    steps:
      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-binaries
          path: release-assets

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-binaries
          path: release-assets

      - name: Download Android Artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-binaries
          path: release-assets

      - name: Rename artifacts for release
        run: |
          mv release-assets/apps/headless_daemon/build/headless_daemon.exe release-assets/headless_daemon-windows.exe
          mv release-assets/apps/headless_daemon/build/headless_daemon release-assets/headless_daemon-linux
          mv release-assets/app-release.apk release-assets/client-flutter-android.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0-build.${{ github.run_number }}
          name: Release v0.1.0 (Build ${{ github.run_number }})
          body: |
            Automated build release for AIOS.
            
            ### Included Artifacts
            - **Windows**:
              - `client-flutter-windows.zip` (Flutter Desktop GUI Client)
              - `headless_daemon-windows.exe` (Headless Daemon CLI Server)
            - **Linux**:
              - `client-flutter-linux.tar.gz` (Flutter Desktop GUI Client)
              - `headless_daemon-linux` (Headless Daemon CLI Server)
            - **Android**:
              - `client-flutter-android.apk` (Flutter Mobile App Client)
          draft: false
          prerelease: false
          files: |
            release-assets/client-flutter-windows.zip
            release-assets/headless_daemon-windows.exe
            release-assets/client-flutter-linux.tar.gz
            release-assets/headless_daemon-linux
            release-assets/client-flutter-android.apk
