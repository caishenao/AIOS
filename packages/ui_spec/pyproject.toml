[project]
name = "ui-spec"
version = "0.1.0"
description = "Shared JSON Schema definitions for Home Steward UI components"
requires-python = ">=3.11"
dependencies = [
    "jsonschema>=4.23.0"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ui_spec"]
include = ["src/ui_spec/**/*.json"]

[tool.ruff]
line-length = 100
